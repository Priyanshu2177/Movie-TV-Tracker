<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cine Time</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <script src="https://kit.fontawesome.com/4cf2ee64c4.js" crossorigin="anonymous"></script>
    <header>
        <div class="home">
            <img id="logo" src="Assets/logo.png" alt="">
            <span>CINE TIME</span>
        </div>
        <div class="header-actions">
            <div class="search-container">
                <div class="search">
                    <input id="search-bar" type="text" placeholder="Search movies and TV shows...." autocomplete="off">
                    <button class="search-btn" aria-label="Search">
                        <i class="fa-brands fa-sistrix "></i>
                    </button>
                </div>
                <div class="search-results">
                    <div class="search-item">
                        <img src="Assets/placeholder-image.jfif" alt="Interstellar poster" class="poster">
                        <div class="search-info">
                            <h4>Interstellar</h4>
                            <p>
                                <i class="fa-solid fa-clapperboard"></i>
                                <span>2014</span>
                                <span>|</span>
                                <i class="fa-brands fa-imdb"></i>
                                <span>8.7</span>
                            </p>
                        </div>
                        <button class="watchlist-btn" aria-label="Add to Watchlist">
                            <i class="fa-regular fa-square-plus"></i>
                        </button>
                    </div>

                    <div class="search-item">
                        <img src="Assets/placeholder-image.jfif" alt="Invincible poster" class="poster">
                        <div class="search-info">
                            <h4>Invincible</h4>
                            <p>
                                <i class="fa-solid fa-tv"></i>
                                <span>2021</span>
                                <span>|</span>
                                <i class="fa-brands fa-imdb"></i>
                                <span>8.7</span>
                            </p>
                        </div>
                        <button class="watchlist-btn added" aria-label="Remove from Watchlist">
                            <i class="fa-solid fa-square-check"></i>
                        </button>
                    </div>

                    <div class="search-item">
                        <img src="Assets/placeholder-image.jfif" alt="Inception poster" class="poster">
                        <div class="search-info">
                            <h4>Inception</h4>
                            <p>
                                <i class="fa-solid fa-clapperboard"></i>
                                <span>2010</span>
                                <span>|</span>
                                <i class="fa-brands fa-imdb"></i>
                                <span>8.8</span>
                            </p>
                        </div>
                        <button class="watchlist-btn added" aria-label="Remove from watchlist">
                            <i class="fa-solid fa-square-check"></i>
                        </button>
                    </div>

                </div>
            </div>
            <button id="theme-toggle">🌙</button>
        </div>
    </header>

    <main id="content">
        <section id="progress-page" class="page active">
            <h1>Progress</h1>
            <div class="progress-container">
                
            </div>
        </section>

        <section id="watchlist-page" class="page">
            <h1>Watchlist</h1>
            <div class="watchlist-tabs">
                <button class="active">Movies</button>
                <button>TV Shows</button>
            </div>
            <div class="watchlist-container">

            </div>
        </section>

        <section id="watched-page" class="page">
            <h1>Watched</h1>
            <div class="watched-tabs">
                <button class="active">Movies</button>
                <button>TV Shows</button>
            </div>
            <div class="watched-container">

            </div>
        </section>
    </main>

    <div class="bottom">
        <div id="progress-tab" class="navigation">
            <div class="nav-content">
                <i class="fa-solid fa-arrow-trend-up icon"></i>
                <span>Progress</span>
            </div>
        </div>
        <div id="watchlist-tab" class="navigation">
            <div class="nav-content">
                <i class="fa-regular fa-calendar-check icon"></i>
                <span>Watchlist</span>
            </div>
        </div>
        <div id="history-tab" class="navigation">
            <div class="nav-content">
                <i class="fa-solid fa-calendar-check icon"></i>
                <span>History</span>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
